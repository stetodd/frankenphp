name: Application image build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read
  packages: write
  
jobs:
  build_frankenphp:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      -   uses: actions/checkout@v4

      -   name: Lowercase github.repository
          run: |
            echo "CONTAINER_URL=ghcr.io/hue-css/builds" >> ${GITHUB_ENV}

      -   name: Set up Docker Buildx
          uses: docker/setup-buildx-action@v3

      -   name: Log in to GitHub Container Registry
          uses: docker/login-action@v3
          with:
            registry: ghcr.io
            username: ${{ github.actor }}
            password: ${{ secrets.GITHUB_TOKEN }}

      -   name: Build and push frankenphp image
          uses: docker/build-push-action@v5
          with:
            context: .
            platforms: linux/amd64,linux/arm64
            file: ./docker/images/frankenphp.Dockerfile
            push: true
            tags: |
              ${{ env.CONTAINER_URL }}/base-frankenphp:latest
              ${{ env.CONTAINER_URL }}/base-frankenphp:${{ github.sha }}
            cache-from: |
              type=gha
            cache-to: |
              type=gha